spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.jwt.secret=${JWT_SECRET}
app.frontend.base-url=${FRONTEND_BASE_URL}
app.backend.base-url=${BACKEND_BASE_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.auth.auto-verify-when-mail-disabled=false
app.razorpay.key-id=${RAZORPAY_KEY_ID}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET}

app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from=${MAIL_FROM}

management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,info,prometheus
management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}
