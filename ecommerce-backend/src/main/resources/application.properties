spring.application.name=ecommerce-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/nexora_store?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:nexora_app}
spring.datasource.password=${DB_PASSWORD:NexoraDev123}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=1

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@nexora.local}

app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.auth.auto-verify-when-mail-disabled=false
app.jwt.secret=${JWT_SECRET:nexora-local-dev-secret-change-me-please-32chars}
app.jwt.access-token-seconds=${JWT_ACCESS_TOKEN_SECONDS:3600}
app.jwt.remember-me-token-seconds=${JWT_REMEMBER_ME_TOKEN_SECONDS:2592000}

app.checkout.gst-rate=${CHECKOUT_GST_RATE:0.18}
app.checkout.free-shipping-threshold=${FREE_SHIPPING_THRESHOLD:500.00}
app.checkout.shipping-fee=${SHIPPING_FEE:99.00}

app.upi.merchant-id=${UPI_MERCHANT_ID:suryakannan32123@oksbi}
app.upi.merchant-name=${UPI_MERCHANT_NAME:Surya Prakash K S}
app.payment-proof.storage-dir=${PAYMENT_PROOF_STORAGE_DIR:./data/payment-proofs}
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Nexora Commerce Backend
info.app.version=@project.version@

springdoc.swagger-ui.path=/swagger-ui.html
