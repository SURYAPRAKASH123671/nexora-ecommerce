services:
  - type: web
    name: nexora-backend
    env: docker
    rootDir: ecommerce-backend
    plan: free
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MAIL_ENABLED
        value: true
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: FRONTEND_BASE_URL
        value: https://nexora-web-virid.vercel.app
      - key: BACKEND_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://nexora-web-virid.vercel.app,https://nexora-commerce-surya.kssuryaprakash2.chatgpt.site,https://nexora-mobile.vercel.app,http://localhost:3000
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: UPI_MERCHANT_ID
        value: suryakannan32123@oksbi
      - key: UPI_MERCHANT_NAME
        value: Surya Prakash K S
